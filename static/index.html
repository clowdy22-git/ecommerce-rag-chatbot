<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>The Corner Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ink: #10241c;
      --evergreen: #1c4d3a;
      --evergreen-dark: #123328;
      --mustard: #d9a441;
      --mustard-deep: #b8842f;
      --cream: #f7f5ef;
      --paper: #fffdf8;
      --line: #e2e0d6;
      --muted: #6b6b60;
      --display: "Fraunces", Georgia, serif;
      --body: "Inter", -apple-system, Segoe UI, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--body);
      margin: 0;
      background: var(--cream);
      color: var(--ink);
    }

    /* ---- Header / Hero ---- */
    .topbar {
      background: var(--evergreen-dark);
      color: var(--cream);
      padding: 10px 32px;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      opacity: 0.85;
    }

    header.hero {
      background: var(--evergreen);
      color: var(--cream);
      padding: 56px 32px 44px;
      position: relative;
      overflow: hidden;
    }

    header.hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(217, 164, 65, 0.25), transparent 70%);
    }

    .hero-eyebrow {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mustard);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .hero h1 {
      font-family: var(--display);
      font-weight: 600;
      font-size: clamp(32px, 5vw, 52px);
      margin: 0 0 12px;
      letter-spacing: -0.01em;
      max-width: 640px;
    }

    .hero p {
      font-size: 15px;
      color: rgba(247, 245, 239, 0.78);
      max-width: 460px;
      margin: 0;
      line-height: 1.55;
    }

    /* ---- Filter bar ---- */
    .filterbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 14px 32px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .chip {
      flex: 0 0 auto;
      font-family: var(--body);
      font-size: 12.5px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
    }

    .chip:hover {
      border-color: var(--evergreen);
      color: var(--evergreen);
    }

    .chip.active {
      background: var(--evergreen);
      border-color: var(--evergreen);
      color: var(--cream);
    }

    /* ---- Grid ---- */
    .grid-wrap {
      padding: 32px;
    }

    .grid-count {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 18px;
      letter-spacing: 0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(16, 36, 28, 0.1);
      border-color: var(--evergreen);
    }

    .card .imgwrap {
      background: var(--cream);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.25s ease;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card .eyebrow {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--mustard-deep);
      margin-bottom: 5px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-family: var(--display);
      font-weight: 600;
      font-size: 15.5px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .price-tag {
      display: inline-block;
      background: var(--mustard);
      color: var(--ink);
      font-weight: 700;
      font-size: 13.5px;
      padding: 3px 10px;
      border-radius: 6px;
    }

    .status {
      padding: 60px 32px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <span>feel free to shop ,but nothing is free </span>
    <span>Est. demo storefront</span>
  </div>

  <header class="hero">
    <div class="hero-eyebrow">Tumcha bazar!</div>
    <h1>Everything you need, nothing you don't.</h1>
    <p>A small catalog, honestly described — ask our shop assistant if you can't find what you're looking for.</p>
  </header>

  <div class="filterbar" id="filterbar"></div>

  <div class="grid-wrap">
    <div id="status" class="status">Loading products...</div>
    <div id="count" class="grid-count" style="display:none"></div>
    <div id="grid" class="grid"></div>
  </div>

  <link rel="stylesheet" href="/widget.css" />
  <script src="/widget.js"></script>

  <script>
    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("grid");
    const filterbarEl = document.getElementById("filterbar");
    const countEl = document.getElementById("count");

    let allProducts = [];
    let activeCategory = "All";

    function topCategory(cat) {
      if (!cat) return "Other";
      const parts = cat.replace(/[\[\]']/g, "").split(">>");
      return (parts[0] || "Other").trim();
    }

    function render() {
      const filtered = activeCategory === "All"
        ? allProducts
        : allProducts.filter((p) => topCategory(p.category) === activeCategory);

      countEl.style.display = "block";
      countEl.textContent = `${filtered.length} product${filtered.length === 1 ? "" : "s"}`;

      gridEl.innerHTML = "";
      filtered.forEach((p) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="imgwrap">
            <img src="${p.image_url}" alt="${p.title}" loading="lazy" onerror="this.style.display='none'" />
          </div>
          <div class="eyebrow">${topCategory(p.category)}</div>
          <h3>${p.title}</h3>
          ${p.price ? `<span class="price-tag">${p.price}</span>` : ""}
        `;
        gridEl.appendChild(card);
      });
    }

    function renderFilters(categories) {
      filterbarEl.innerHTML = "";
      ["All", ...categories].forEach((cat) => {
        const chip = document.createElement("button");
        chip.className = "chip" + (cat === activeCategory ? " active" : "");
        chip.textContent = cat;
        chip.addEventListener("click", () => {
          activeCategory = cat;
          filterbarEl.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
          chip.classList.add("active");
          render();
        });
        filterbarEl.appendChild(chip);
      });
    }

    fetch("/products")
      .then((res) => res.json())
      .then((products) => {
        if (!products || products.length === 0) {
          statusEl.textContent = "No products found yet — run scripts/ingest.py to populate the catalog.";
          return;
        }
        statusEl.remove();
        allProducts = products;
        const categories = [...new Set(products.map((p) => topCategory(p.category)))].sort();
        renderFilters(categories);
        render();
      })
      .catch((err) => {
        statusEl.textContent = "Couldn't load products — make sure the server is running properly.";
      });
  </script>
</body>

</html>
